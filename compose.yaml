

services: #docker compose expects
  static_html:
    build:
      context: ./static_html
      dockerfile: static.Dockerfile
    command: python -m http.server 8000
    ports:
      - 3000:8000
    volumes:
      - ./static_html/src:/app
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: uvicorn main:app --host 0.0.0.0 --port 8000 #--reload
    environment:
      - PORT=8000
      - MY_PROJECT=HELLO WORLD123 #watch for quotes in here. .env_file handles "" better
    env_file:
      - .env.sample
    ports:
      - 8080:8000
    volumes:
     - ./backend/src:/app
    develop:
      watch:
        - action: rebuild
          path: ./backend/requirements.txt
        - action: rebuild
          path: ./backend/Dockerfile
        - action: restart
          path: ./backend/src/
        # - action: sync
        #   path: ./backend/src/
        #   target: /app



services: #docker compose expects
  static_html:
    build:
      context: ./static_html
      dockerfile: static.Dockerfile
    command: python -m http.server 8000
    ports:
      - 3000:8000
    volumes:
      - ./static_html/src:/app
  
 
  
  
  
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: uvicorn main:app --host 0.0.0.0 --port 8000 #--reload
    environment:
      - PORT=8000
      - MY_PROJECT=HELLO WORLD123 #watch for quotes in here. .env_file handles "" better
    env_file:
      - .env.sample
      #- .env.sample-db
    ports:
      - 8080:8000
    volumes:
     - ./backend/src:/app
    depends_on:
      - db_service
    develop:
      watch:
        - action: rebuild
          path: ./backend/requirements.txt
        - action: rebuild
          path: ./backend/Dockerfile
        - action: restart
          path: ./backend/src/
        # - action: sync
        #   path: ./backend/src/
        #   target: /app

  #DATABASE SERVICE: DATABASE_URL=postgresql://dbuser:db-password@db_service:5432/mydb
  db_service:
    image: postgres:17.5
    ports:
      - 5432:5432
    volumes:
      - dc_managed_db_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=dbuser
      - POSTGRES_PASSWORD=db-password
      - POSTGRES_DB=mydb 
    # healthcheck:
    #   test: ["CMD-SHELL", "pg_isready -U dbuser -d mydb -h localhost -p 5432"]
    #   interval: 1m30s
    #   timeout: 30s
    #   retries: 5
    #   start_period: 30s



volumes:
  dc_managed_db_data: